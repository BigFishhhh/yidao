services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - chroma_data:/app/chroma_db
      - ./backend/data/books:/app/data/books
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY:-}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro  # HTTPS 证书目录
    depends_on:
      - frontend
      - backend

volumes:
  chroma_data:
